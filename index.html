<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Familien Reise-Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #ffffff;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            z-index: 1000;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        header h1 {
            font-size: 1.15rem;
            color: #1d1d1f;
            font-weight: 600;
        }

        .toggle-btn {
            background: #0071e3;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
        }

        .legend-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: #515154;
        }

        .color-badge {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 6px;
            flex-shrink: 0;
        }

        .bg-family  { background-color: #2ecc71; border: 1px solid #27ae60; }
        .bg-couple  { background-color: #3498db; border: 1px solid #2980b9; }
        .bg-bucket  { background-color: #f1c40f; border: 1px solid #f39c12; }
        .bg-default { background-color: #bdc3c7; border: 1px solid #95a5a6; }

        .editor-box {
            display: none;
            background: #f5f5f7;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #d2d2d7;
        }

        .editor-box.active {
            display: block;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        .input-group select, .input-group input {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            background-color: white;
            -webkit-appearance: none;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .action-btn {
            color: white;
            border: none;
            padding: 12px 4px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-family { background-color: #2ecc71; }
        .btn-couple { background-color: #3498db; }
        .btn-bucket { background-color: #f1c40f; color: #1d1d1f; }
        
        .reset-btn {
            width: 100%;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background: #cbdbe3;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>🌍 Reise-Dashboard</h1>
            <button class="toggle-btn" onclick="toggleEditor()">Land eintragen</button>
        </div>
        
        <div class="legend-container">
            <div class="legend-item"><div class="color-badge bg-family"></div>Als Familie (Grün)</div>
            <div class="legend-item"><div class="color-badge bg-couple"></div>Ohne Kinder (Blau)</div>
            <div class="legend-item"><div class="color-badge bg-bucket"></div>Bucketlist (Gelb)</div>
            <div class="legend-item"><div class="color-badge bg-default"></div>Offen (Grau)</div>
        </div>

        <div id="editorBox" class="editor-box">
            <div class="input-group">
                <label for="countrySelect">Land auswählen:</label>
                <select id="countrySelect"></select>
            </div>
            <div class="input-group">
                <label for="yearInput">Jahr (optional, z.B. 2026):</label>
                <input type="number" id="yearInput" placeholder="Jahr eintragen" min="1990" max="2050">
            </div>
            <div class="btn-grid">
                <button class="action-btn btn-family" onclick="setCountryStatus('family')">Familie</button>
                <button class="action-btn btn-couple" onclick="setCountryStatus('noKids')">Ohne Kinder</button>
                <button class="action-btn btn-bucket" onclick="setCountryStatus('bucket')">Bucketlist</button>
            </div>
            <button class="reset-btn" onclick="setCountryStatus('open')">Auf "Offen" zurücksetzen</button>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Definition aller Länder der Erde inklusive Koordinaten für Kleinstaaten (z.B. Singapur)
        const countriesList = [
            {code:"AFG", name:"Afghanistan", alt:[]}, {code:"EGY", name:"Ägypten", alt:["Egypt"]}, {code:"ALB", name:"Albanien", alt:["Albania"]}, {code:"DZA", name:"Algerien", alt:["Algeria"]}, {code:"AND", name:"Andorra", alt:[], latlng:[42.5, 1.5]}, {code:"AGO", name:"Angola", alt:[]}, {code:"ATG", name:"Antigua und Barbuda", alt:[], latlng:[17.1, -61.8]}, {code:"GNQ", name:"Äquatorialguinea", alt:[]}, {code:"ARG", name:"Argentinien", alt:["Argentina"]}, {code:"ARM", name:"Armenien", alt:[]}, {code:"AZE", name:"Aserbaidschan", alt:[]}, {code:"ETH", name:"Äthiopien", alt:[]}, {code:"AUS", name:"Australien", alt:["Australia"]}, {code:"BHS", name:"Bahamas", alt:[]}, {code:"BHR", name:"Bahrain", alt:[], latlng:[26.0, 50.5]}, {code:"BGD", name:"Bangladesch", alt:["Bangladesh"]}, {code:"BRB", name:"Barbados", alt:[], latlng:[13.2, -59.5]}, {code:"BEL", name:"Belgien", alt:["Belgium"]}, {code:"BLZ", name:"Belize", alt:[]}, {code:"BEN", name:"Benin", alt:[]}, {code:"BTN", name:"Bhutan", alt:[]}, {code:"BOL", name:"Bolivien", alt:[]}, {code:"BIH", name:"Bosnien und Herzegowina", alt:[]}, {code:"BWA", name:"Botswana", alt:[]}, {code:"BRA", name:"Brasilien", alt:["Brazil"]}, {code:"BRN", name:"Brunei", alt:[], latlng:[4.5, 114.7]}, {code:"BGR", name:"Bulgarien", alt:["Bulgaria"]}, {code:"BFA", name:"Burkina Faso", alt:[]}, {code:"BDI", name:"Burundi", alt:[]}, {code:"CHL", name:"Chile", alt:[]}, {code:"CHN", name:"China", alt:[]}, {code:"CRI", name:"Costa Rica", alt:[]}, {code:"DNK", name:"Dänemark", alt:["Denmark"]}, {code:"DEU", name:"Deutschland", alt:["Germany"]}, {code:"DMA", name:"Dominica", alt:[], latlng:[15.4, -61.4]}, {code:"DOM", name:"Dominikanische Republik", alt:["Dom. Republik"]}, {code:"DJI", name:"Dschibuti", alt:[]}, {code:"ECU", name:"Ecuador", alt:[]}, {code:"SLV", name:"El Salvador", alt:[]}, {code:"CIV", name:"Elfenbeinküste", alt:[]}, {code:"ERI", name:"Eritrea", alt:[]}, {code:"EST", name:"Estland", alt:["Estonia"]}, {code:"SWZ", name:"Eswatini", alt:[]}, {code:"FJI", name:"Fidschi", alt:["Fiji"]}, {code:"FIN", name:"Finnland", alt:["Finland"]}, {code:"FRA", name:"Frankreich", alt:["France"]}, {code:"GAB", name:"Gabun", alt:[]}, {code:"GMB", name:"Gambia", alt:[]}, {code:"GEO", name:"Georgien", alt:[]}, {code:"GHA", name:"Ghana", alt:[]}, {code:"GRD", name:"Grenada", alt:[], latlng:[12.1, -61.7]}, {code:"GRC", name:"Griechenland", alt:["Greece"]}, {code:"GTM", name:"Guatemala", alt:[]}, {code:"GIN", name:"Guinea", alt:[]}, {code:"GNB", name:"Guinea-Bissau", alt:[]}, {code:"GUY", name:"Guyana", alt:[]}, {code:"HTI", name:"Haiti", alt:[]}, {code:"HND", name:"Honduras", alt:[]}, {code:"IND", name:"Indien", alt:["India"]}, {code:"IDN", name:"Indonesien", alt:["Indonesia"]}, {code:"IRQ", name:"Irak", alt:[]}, {code:"IRN", name:"Iran", alt:[]}, {code:"IRL", name:"Irland", alt:["Ireland"]}, {code:"ISL", name:"Island", alt:["Iceland"]}, {code:"ISR", name:"Israel", alt:[]}, {code:"ITA", name:"Italien", alt:["Italy"]}, {code:"JAM", name:"Jamaika", alt:["Jamaica"]}, {code:"JPN", name:"Japan", alt:[]}, {code:"YEM", name:"Jemen", alt:[]}, {code:"JOR", name:"Jordanien", alt:["Jordan"]}, {code:"KHM", name:"Kambodscha", alt:[]}, {code:"CMR", name:"Kamerun", alt:[]}, {code:"CAN", name:"Kanada", alt:["Canada"]}, {code:"CPV", name:"Kap Verde", alt:[], latlng:[16.0, -24.0]}, {code:"KAZ", name:"Kasachstan", alt:[]}, {code:"QAT", name:"Katar", alt:[], latlng:[25.3, 51.2]}, {code:"KEN", name:"Kenia", alt:["Kenya"]}, {code:"KGZ", name:"Kirgisistan", alt:[]}, {code:"KIR", name:"Kiribati", alt:[], latlng:[-1.4, 173.0]}, {code:"COL", name:"Kolumbien", alt:["Colombia"]}, {code:"COM", name:"Komoren", alt:[], latlng:[-12.2, 44.4]}, {code:"COG", name:"Kongo (Republik)", alt:[]}, {code:"COD", name:"Kongo (Dem. Rep.)", alt:[]}, {code:"KOR", name:"Südkorea", alt:["Korea"]}, {code:"HRV", name:"Kroatien", alt:["Croatia"]}, {code:"CUB", name:"Kuba", alt:["Cuba"]}, {code:"KWT", name:"Kuwait", alt:[]}, {code:"LAO", name:"Laos", alt:[]}, {code:"LSO", name:"Lesotho", alt:[]}, {code:"LVA", name:"Lettland", alt:[]}, {code:"LBN", name:"Libanon", alt:[], latlng:[33.9, 35.5]}, {code:"LBR", name:"Liberia", alt:[]}, {code:"LBY", name:"Libyen", alt:[]}, {code:"LIE", name:"Liechtenstein", alt:[], latlng:[47.1, 9.5]}, {code:"LTU", name:"Litauen", alt:[]}, {code:"LUX", name:"Luxemburg", alt:[], latlng:[49.6, 6.1]}, {code:"MDG", name:"Madagaskar", alt:[]}, {code:"MWI", name:"Malawi", alt:[]}, {code:"MYS", name:"Malaysia", alt:[]}, {code:"MDV", name:"Malediven", alt:["Maldives"], latlng:[3.2, 73.0]}, {code:"MLI", name:"Mali", alt:[]}, {code:"MLT", name:"Malta", alt:[], latlng:[35.9, 14.4]}, {code:"MAR", name:"Marokko", alt:["Morocco"]}, {code:"MHL", name:"Marshallinseln", alt:[], latlng:[7.1, 171.1]}, {code:"MRT", name:"Mauretanien", alt:[]}, {code:"MUS", name:"Mauritius", alt:[], latlng:[-20.3, 57.5]}, {code:"MEX", name:"Mexiko", alt:["Mexico"]}, {code:"FSM", name:"Mikronesien", alt:[], latlng:[6.9, 158.2]}, {code:"MDA", name:"Moldawien", alt:[]}, {code:"MCO", name:"Monaco", alt:[], latlng:[43.7, 7.4]}, {code:"MNG", name:"Mongolei", alt:[]}, {code:"MNE", name:"Montenegro", alt:[]}, {code:"MOZ", name:"Mosambik", alt:[]}, {code:"MMR", name:"Myanmar", alt:[]}, {code:"NAM", name:"Namibia", alt:[]}, {code:"NRU", name:"Nauru", alt:[], latlng:[-0.5, 166.9]}, {code:"NPL", name:"Nepal", alt:[]}, {code:"NZL", name:"Neuseeland", alt:["New Zealand"]}, {code:"NIC", name:"Nicaragua", alt:[]}, {code:"NLD", name:"Niederlande", alt:["Netherlands"]}, {code:"NER", name:"Niger", alt:[]}, {code:"NGA", name:"Nigeria", alt:[]}, {code:"MKD", name:"Nordmazedonien", alt:[]}, {code:"NOR", name:"Norwegen", alt:["Norway"]}, {code:"OMN", name:"Oman", alt:[]}, {code:"AUT", name:"Österreich", alt:["Austria"]}, {code:"PAK", name:"Pakistan", alt:[]}, {code:"PLW", name:"Palau", alt:[], latlng:[7.5, 134.5]}, {code:"PAN", name:"Panama", alt:[]}, {code:"PNG", name:"Papua-Neuguinea", alt:[]}, {code:"PRY", name:"Paraguay", alt:[]}, {code:"PER", name:"Peru", alt:[]}, {code:"PHL", name:"Philippinen", alt:["Philippines"]}, {code:"POL", name:"Polen", alt:["Poland"]}, {code:"PRT", name:"Portugal", alt:[]}, {code:"RWA", name:"Ruanda", alt:[]}, {code:"ROU", name:"Rumänien", alt:["Romania"]}, {code:"RUS", name:"Russland", alt:[]}, {code:"KNA", name:"St. Kitts und Nevis", alt:[], latlng:[17.3, -62.7]}, {code:"LCA", name:"St. Lucia", alt:[], latlng:[13.9, -60.9]}, {code:"VCT", name:"St. Vincent", alt:[], latlng:[13.2, -61.2]}, {code:"WSM", name:"Samoa", alt:[], latlng:[-13.7, -172.1]}, {code:"SMR", name:"San Marino", alt:[], latlng:[43.9, 12.4]}, {code:"STP", name:"São Tomé und Príncipe", alt:[], latlng:[0.2, 6.6]}, {code:"SAU", name:"Saudi-Arabien", alt:[]}, {code:"SWE", name:"Schweden", alt:["Sweden"]}, {code:"CHE", name:"Schweiz", alt:["Switzerland"]}, {code:"SEN", name:"Senegal", alt:[]}, {code:"SRB", name:"Serbien", alt:[]}, {code:"SYC", name:"Seychellen", alt:["Seychelles"], latlng:[-4.6, 55.4]}, {code:"SLE", name:"Sierra Leone", alt:[]}, {code:"SGP", name:"Singapur", alt:["Singapore"], latlng:[1.35, 103.8]}, {code:"SVK", name:"Slowakei", alt:["Slovakia"]}, {code:"SVN", name:"Slowenien", alt:["Slovenia"]}, {code:"SLB", name:"Salomonen", alt:[]}, {code:"SOM", name:"Somalia", alt:[]}, {code:"ESP", name:"Spanien", alt:["Spain"]}, {code:"LKA", name:"Sri Lanka", alt:[]}, {code:"ZAF", name:"Südafrika", alt:["South Africa"]}, {code:"SDN", name:"Sudan", alt:[]}, {code:"SUR", name:"Suriname", alt:[]}, {code:"SYR", name:"Syrien", alt:[]}, {code:"TJK", name:"Tadschikistan", alt:[]}, {code:"TWN", name:"Taiwan", alt:[]}, {code:"TZA", name:"Tansania", alt:[]}, {code:"THA", name:"Thailand", alt:[]}, {code:"TLS", name:"Osttimor", alt:[]}, {code:"TGO", name:"Togo", alt:[]}, {code:"TON", name:"Tonga", alt:[], latlng:[-21.1, -175.2]}, {code:"TTO", name:"Trinidad und Tobago", alt:[]}, {code:"TCD", name:"Tschad", alt:[]}, {code:"CZE", name:"Tschechien", alt:["Czechia"]}, {code:"TUN", name:"Tunesien", alt:["Tunisia"]}, {code:"TUR", name:"Türkei", alt:["Turkey"]}, {code:"TKM", name:"Turkmenistan", alt:[]}, {code:"TUV", name:"Tuvalu", alt:[], latlng:[-7.8, 178.4]}, {code:"UGA", name:"Uganda", alt:[]}, {code:"UKR", name:"Ukraine", alt:[]}, {code:"HUN", name:"Ungarn", alt:["Hungary"]}, {code:"URY", name:"Uruguay", alt:[]}, {code:"UZB", name:"Usbekistan", alt:[]}, {code:"VUT", name:"Vanuatu", alt:[], latlng:[-15.3, 166.9]}, {code:"VAT", name:"Vatikanstadt", alt:[], latlng:[41.9, 12.45]}, {code:"VEN", name:"Venezuela", alt:[]}, {code:"ARE", name:"Verg. Arab. Emirate", alt:["UAE"]}, {code:"GBR", name:"Vereinigtes Königreich", alt:["Großbritannien", "UK"]}, {code:"USA", name:"USA", alt:["United States"]}, {code:"VNM", name:"Vietnam", alt:[]}, {code:"CAF", name:"Zentralafrikanische Rep.", alt:[]}, {code:"CYP", name:"Zypern", alt:["Cyprus"]}, {code:"ZMB", name:"Sambia", alt:[]}, {code:"ZWE", name:"Simbabwe", alt:[]}
        ].sort((a, b) => a.name.localeCompare(b.name));

        // Dropdown befüllen
        const select = document.getElementById('countrySelect');
        countriesList.forEach(c => {
            let option = document.createElement('option');
            option.value = c.code;
            option.textContent = c.name;
            select.appendChild(option);
        });

        // Strukturierte Datenstruktur mit inkludierten Jahreszahlen
        const defaultData = {
            family: { "DEU":"", "FRA":"", "ITA":"", "ESP":"" },
            noKids: { "USA":"2019", "THA":"", "SGP":"" },
            bucket: { "JPN":"", "CAN":"", "ISL":"", "NZL":"" }
        };

        let travelData = JSON.parse(localStorage.getItem('travelData2')) || defaultData;

        const map = L.map('map', {
            zoomSnap: 0.5,
            minZoom: 1.2,
            maxZoom: 5,
            attributionControl: false
        }).setView([15, 15], 1.5);

        let geoJsonLayer;
        let markerGroup = L.layerGroup().addTo(map); // Gruppe für kleine Inseln/Stadtstaaten

        function getCategoryColor(code) {
            if (code in travelData.family) return "#2ecc71"; // Grün
            if (code in travelData.noKids) return "#3498db"; // Blau
            if (code in travelData.bucket) return "#f1c40f"; // Gelb
            return "#bdc3c7"; // Grau
        }

        function getYearText(code) {
            let year = travelData.family[code] || travelData.noKids[code] || travelData.bucket[code] || "";
            return year ? ` (${year})` : "";
        }

        // Farbabgleich für große Polygone
        function getCountryColor(feature) {
            const props = feature.properties;
            const id = (props.ISO_A3 || props.id || props.name || "").toUpperCase();
            const nameEng = (props.name || props.NAME || "").toLowerCase();

            const foundCountry = countriesList.find(c => {
                return c.code === id || id.includes(c.code) || c.alt.some(a => id === a.toUpperCase() || nameEng === a.toLowerCase());
            });

            if (!foundCountry) return "#bdc3c7";
            return getCategoryColor(foundCountry.code);
        }

        function styleFeature(feature) {
            return {
                fillColor: getCountryColor(feature),
                weight: 1,
                opacity: 1,
                color: '#ffffff',
                fillOpacity: 0.75
            };
        }

        function onEachFeature(feature, layer) {
            const props = feature.properties;
            const id = (props.ISO_A3 || props.id || "").toUpperCase();
            const found = countriesList.find(c => c.code === id || id.includes(c.code));
            
            let displayName = props.name || props.NAME || "Unbekannt";
            if (found) {
                displayName = found.name + getYearText(found.code);
            }
            layer.bindPopup(`<b>${displayName}</b>`);
        }

        // Zeichnet Kreis-Marker für kleine Länder (z.B. Singapur), damit sie sichtbar werden
        function updateSmallCountryMarkers() {
            markerGroup.clearLayers();
            countriesList.forEach(c => {
                if (c.latlng) { // Nur für registrierte Kleinstaaten
                    const color = getCategoryColor(c.code);
                    if (color !== "#bdc3c7") { // Nur anzeigen wenn farbig gesetzt
                        const label = c.name + getYearText(c.code);
                        L.circleMarker(c.latlng, {
                            radius: 7,
                            fillColor: color,
                            color: "#ffffff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).bindPopup(`<b>${label}</b>`).addTo(markerGroup);
                    }
                }
            });
        }

        function toggleEditor() {
            document.getElementById('editorBox').classList.toggle('active');
        }

        function setCountryStatus(category) {
            const selectedCode = document.getElementById('countrySelect').value;
            const yearValue = document.getElementById('yearInput').value.trim();

            // Aus allen Kategorien löschen
            delete travelData.family[selectedCode];
            delete travelData.noKids[selectedCode];
            delete travelData.bucket[selectedCode];

            // In neue Kategorie einsortieren mit Jahr
            if (category !== 'open') {
                travelData[category][selectedCode] = yearValue;
            }

            localStorage.setItem('travelData2', JSON.stringify(travelData));

            // UI & Karte aktualisieren
            if (geoJsonLayer) geoJsonLayer.setStyle(styleFeature);
            updateSmallCountryMarkers();
            
            document.getElementById('yearInput').value = ""; // Input leeren
            toggleEditor();
        }

        const geoJsonUrl = 'https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json';

        fetch(geoJsonUrl)
            .then(res => res.json())
            .then(geoData => {
                geoJsonLayer = L.geoJSON(geoData, {
                    style: styleFeature,
                    onEachFeature: onEachFeature
                }).addTo(map);
                updateSmallCountryMarkers();
            });
    </script>
</body>
</html>
