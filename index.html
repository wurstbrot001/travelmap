<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Familien Reise-Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #ffffff;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            z-index: 1000;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        header h1 {
            font-size: 1.15rem;
            color: #1d1d1f;
            font-weight: 600;
        }

        .toggle-btn {
            background: #0071e3;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
        }

        .legend-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: #515154;
        }

        .color-badge {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 6px;
            flex-shrink: 0;
        }

        .bg-family  { background-color: #2ecc71; border: 1px solid #27ae60; }
        .bg-couple  { background-color: #3498db; border: 1px solid #2980b9; }
        .bg-bucket  { background-color: #f1c40f; border: 1px solid #f39c12; }
        .bg-default { background-color: #bdc3c7; border: 1px solid #95a5a6; }

        .editor-box {
            display: none;
            background: #f5f5f7;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #d2d2d7;
        }

        .editor-box.active {
            display: block;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        .input-group select {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            background-color: white;
            -webkit-appearance: none;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .action-btn {
            color: white;
            border: none;
            padding: 10px 4px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-family { background-color: #2ecc71; }
        .btn-couple { background-color: #3498db; }
        .btn-bucket { background-color: #f1c40f; color: #1d1d1f; }
        
        .reset-btn {
            width: 100%;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background: #cbdbe3;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>🌍 Reise-Dashboard</h1>
            <button class="toggle-btn" onclick="toggleEditor()">Land eintragen</button>
        </div>
        
        <div class="legend-container">
            <div class="legend-item"><div class="color-badge bg-family"></div>Als Familie (Grün)</div>
            <div class="legend-item"><div class="color-badge bg-couple"></div>Ohne Kinder (Blau)</div>
            <div class="legend-item"><div class="color-badge bg-bucket"></div>Bucketlist (Gelb)</div>
            <div class="legend-item"><div class="color-badge bg-default"></div>Offen (Grau)</div>
        </div>

        <div id="editorBox" class="editor-box">
            <div class="input-group">
                <label for="countrySelect">Land auswählen:</label>
                <select id="countrySelect">
                    </select>
            </div>
            <div class="btn-grid">
                <button class="action-btn btn-family" onclick="setCountryStatus('family')">Familie</button>
                <button class="action-btn btn-couple" onclick="setCountryStatus('noKids')">Ohne Kinder</button>
                <button class="action-btn btn-bucket" onclick="setCountryStatus('bucket')">Bucketlist</button>
            </div>
            <button class="reset-btn" onclick="setCountryStatus('open')">Auf "Offen" zurücksetzen</button>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Mappe ISO-Codes sauber auf Ländernamen, um Abweichungen in Karten zu korrigieren
        const countriesList = [
            {code: "DEU", name: "Deutschland", alt: ["Germany", "DE"]},
            {code: "AUT", name: "Österreich", alt: ["Austria", "AT"]},
            {code: "CHE", name: "Schweiz", alt: ["Switzerland", "CH"]},
            {code: "FRA", name: "Frankreich", alt: ["France", "FR"]},
            {code: "ITA", name: "Italien", alt: ["Italy", "IT"]},
            {code: "ESP", name: "Spanien", alt: ["Spain", "ES"]},
            {code: "PRT", name: "Portugal", alt: ["PT"]},
            {code: "GRC", name: "Griechenland", alt: ["Greece", "GR"]},
            {code: "HRV", name: "Kroatien", alt: ["Croatia", "HR"]},
            {code: "NLD", name: "Niederlande", alt: ["Netherlands", "NL"]},
            {code: "BEL", name: "Belgien", alt: ["Belgium", "BE"]},
            {code: "GBR", name: "Großbritannien", alt: ["United Kingdom", "UK", "GB"]},
            {code: "DNK", name: "Dänemark", alt: ["Denmark", "DK"]},
            {code: "SWE", name: "Schweden", alt: ["Sweden", "SE"]},
            {code: "NOR", name: "Norwegen", alt: ["Norway", "NO"]},
            {code: "FIN", name: "Finnland", alt: ["Finland", "FI"]},
            {code: "ISL", name: "Island", alt: ["Iceland", "IS"]},
            {code: "TUR", name: "Türkei", alt: ["Turkey", "TR"]},
            {code: "EGY", name: "Ägypten", alt: ["Egypt", "EG"]},
            {code: "USA", name: "USA", alt: ["United States of America", "United States", "US"]},
            {code: "CAN", name: "Kanada", alt: ["Canada", "CA"]},
            {code: "MEX", name: "Mexiko", alt: ["Mexico", "MX"]},
            {code: "THA", name: "Thailand", alt: ["TH"]},
            {code: "SGP", name: "Singapur", alt: ["Singapore", "SG"]},
            {code: "JPN", name: "Japan", alt: ["JP"]},
            {code: "CHN", name: "China", alt: ["CN"]},
            {code: "AUS", name: "Australien", alt: ["Australia", "AU"]},
            {code: "NZL", name: "Neuseeland", alt: ["New Zealand", "NZ"]}
        ].sort((a, b) => a.name.localeCompare(b.name));

        // Dropdown initialisieren
        const select = document.getElementById('countrySelect');
        countriesList.forEach(c => {
            let option = document.createElement('option');
            option.value = c.code;
            option.textContent = c.name;
            select.appendChild(option);
        });

        // Startdaten (Nutzt LocalStorage)
        const defaultData = {
            family: ["DEU", "FRA", "ITA", "ESP"],
            noKids: ["USA", "THA", "SGP"],
            bucket: ["JPN", "CAN", "ISL", "NZL"]
        };

        let travelData = JSON.parse(localStorage.getItem('travelData')) || defaultData;

        // Karte aufsetzen
        const map = L.map('map', {
            zoomSnap: 0.5,
            minZoom: 1.2,
            maxZoom: 5,
            attributionControl: false
        }).setView([20, 10], 1.5);

        let geoJsonLayer;

        // Intelligenter Farbabgleich (prüft Code und alle bekannten Alternativnamen)
        function getCountryColor(feature) {
            const props = feature.properties;
            const id = (props.ISO_A3 || props.id || props.name || "").toUpperCase();
            const nameEng = (props.name || props.NAME || "").toLowerCase();

            // Finde das passende Land in unserer Config-Liste
            const foundCountry = countriesList.find(c => {
                return c.code === id || 
                       id.includes(c.code) || 
                       c.alt.some(a => id === a.toUpperCase() || nameEng === a.toLowerCase());
            });

            if (!foundCountry) return "#bdc3c7"; // Grau, falls nicht in der Liste oben

            const code = foundCountry.code;
            if (travelData.family.includes(code)) return "#2ecc71"; // Grün
            if (travelData.noKids.includes(code)) return "#3498db"; // Blau
            if (travelData.bucket.includes(code)) return "#f1c40f"; // Gelb
            return "#bdc3c7"; // Standard Grau
        }

        function styleFeature(feature) {
            return {
                fillColor: getCountryColor(feature),
                weight: 1,
                opacity: 1,
                color: '#ffffff',
                fillOpacity: 0.75
            };
        }

        function onEachFeature(feature, layer) {
            const props = feature.properties;
            const name = props.name || props.NAME || "Unbekannt";
            layer.bindPopup(`<b>${name}</b>`);
        }

        function toggleEditor() {
            document.getElementById('editorBox').classList.toggle('active');
        }

        function setCountryStatus(category) {
            const selectedCode = document.getElementById('countrySelect').value;

            // Alten Status löschen
            travelData.family = travelData.family.filter(c => c !== selectedCode);
            travelData.noKids = travelData.noKids.filter(c => c !== selectedCode);
            travelData.bucket = travelData.bucket.filter(c => c !== selectedCode);

            // Neu zuordnen
            if (category !== 'open') {
                travelData[category].push(selectedCode);
            }

            localStorage.setItem('travelData', JSON.stringify(travelData));

            // Karte neu rendern
            if (geoJsonLayer) {
                geoJsonLayer.setStyle(styleFeature);
            }

            toggleEditor();
        }

        // Nutzen ein stabiles, minimalistisches GeoJSON
        const geoJsonUrl = 'https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json';

        fetch(geoJsonUrl)
            .then(res => res.json())
            .then(geoData => {
                geoJsonLayer = L.geoJSON(geoData, {
                    style: styleFeature,
                    onEachFeature: onEachFeature
                }).addTo(map);
            })
            .catch(err => console.error("Fehler:", err));
    </script>
</body>
</html>
