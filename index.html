<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Familien Reise-Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #ffffff;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            z-index: 1000;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        header h1 {
            font-size: 1.15rem;
            color: #1d1d1f;
            font-weight: 600;
        }

        .toggle-btn {
            background: #0071e3;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
        }

        .legend-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: #515154;
        }

        .color-badge {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 6px;
            flex-shrink: 0;
        }

        .bg-family  { background-color: #2ecc71; border: 1px solid #27ae60; }
        .bg-couple  { background-color: #3498db; border: 1px solid #2980b9; }
        .bg-bucket  { background-color: #f1c40f; border: 1px solid #f39c12; }
        .bg-default { background-color: #bdc3c7; border: 1px solid #95a5a6; }

        /* Mobil-optimierter Editor-Bereich */
        .editor-box {
            display: none;
            background: #f5f5f7;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #d2d2d7;
        }

        .editor-box.active {
            display: block;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        /* Nativ aussehendes großes Dropdown für iOS Touch */
        .input-group select {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            background-color: white;
            -webkit-appearance: none;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .action-btn {
            color: white;
            border: none;
            padding: 10px 4px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-family { background-color: #2ecc71; }
        .btn-couple { background-color: #3498db; }
        .btn-bucket { background-color: #f1c40f; color: #1d1d1f; }
        
        .reset-btn {
            width: 100%;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background: #cbdbe3;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>🌍 Reise-Dashboard</h1>
            <button class="toggle-btn" onclick="toggleEditor()">Land eintragen</button>
        </div>
        
        <div class="legend-container">
            <div class="legend-item"><div class="color-badge bg-family"></div>Als Familie (Grün)</div>
            <div class="legend-item"><div class="color-badge bg-couple"></div>Ohne Kinder (Blau)</div>
            <div class="legend-item"><div class="color-badge bg-bucket"></div>Bucketlist (Gelb)</div>
            <div class="legend-item"><div class="color-badge bg-default"></div>Offen (Grau)</div>
        </div>

        <div id="editorBox" class="editor-box">
            <div class="input-group">
                <label for="countrySelect">Land auswählen:</label>
                <select id="countrySelect">
                    </select>
            </div>
            <div class="btn-grid">
                <button class="action-btn btn-family" onclick="setCountryStatus('family')">Familie</button>
                <button class="action-btn btn-couple" onclick="setCountryStatus('noKids')">Ohne Kinder</button>
                <button class="action-btn btn-bucket" onclick="setCountryStatus('bucket')">Bucketlist</button>
            </div>
            <button class="reset-btn" onclick="setCountryStatus('open')">Auf "Offen (Grau)" zurücksetzen</button>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Eine Liste der gängigsten Reiseländer für das Dropdown-Menü
        const countriesList = [
            {code: "DEU", name: "Deutschland"}, {code: "AUT", name: "Österreich"}, {code: "CHE", name: "Schweiz"},
            {code: "FRA", name: "Frankreich"}, {code: "ITA", name: "Italien"}, {code: "ESP", name: "Spanien"},
            {code: "PRT", name: "Portugal"}, {code: "GRC", name: "Griechenland"}, {code: "HRV", name: "Kroatien"},
            {code: "NLD", name: "Niederlande"}, {code: "BEL", name: "Belgien"}, {code: "GBR", name: "Großbritannien"},
            {code: "DNK", name: "Dänemark"}, {code: "SWE", name: "Schweden"}, {code: "NOR", name: "Norwegen"},
            {code: "FIN", name: "Finnland"}, {code: "ISL", name: "Island"}, {code: "TUR", name: "Türkei"},
            {code: "EGY", name: "Ägypten"}, {code: "TUN", name: "Tunesien"}, {code: "ZAF", name: "Südafrika"},
            {code: "USA", name: "USA"}, {code: "CAN", name: "Kanada"}, {code: "MEX", name: "Mexiko"},
            {code: "DOM", name: "Dom. Republik"}, {code: "CUB", name: "Kuba"}, {code: "BRA", name: "Brasilien"},
            {code: "ARG", name: "Argentinien"}, {code: "THA", name: "Thailand"}, {code: "SGP", name: "Singapur"},
            {code: "JPN", name: "Japan"}, {code: "CHN", name: "China"}, {code: "IND", name: "Indien"},
            {code: "IDN", name: "Indonesien"}, {code: "VNM", name: "Vietnam"}, {code: "MDV", name: "Malediven"},
            {code: "AUS", name: "Australien"}, {code: "NZL", name: "Neuseeland"}
        ].sort((a, b) => a.name.localeCompare(b.name)); // Alphabetisch sortieren

        // Dropdown befüllen
        const select = document.getElementById('countrySelect');
        countriesList.forEach(c => {
            let option = document.createElement('option');
            option.value = c.code;
            option.textContent = c.name;
            select.appendChild(option);
        });

        // Startdaten definieren
        const defaultData = {
            family: ["DEU", "FRA", "ITA", "ESP"],
            noKids: ["USA", "THA", "SGP"],
            bucket: ["JPN", "CAN", "ISL", "NZL"]
        };

        let travelData = JSON.parse(localStorage.getItem('travelData')) || defaultData;

        // Karte initialisieren
        const map = L.map('map', {
            zoomSnap: 0.5,
            minZoom: 1.2,
            maxZoom: 5,
            attributionControl: false
        }).setView([25, 10], 1.5);

        let geoJsonLayer;

        function getCountryColor(isoCode) {
            if (!isoCode) return "#bdc3c7";
            const cleanCode = isoCode.toUpperCase();
            if (travelData.family.includes(cleanCode)) return "#2ecc71";
            if (travelData.noKids.includes(cleanCode)) return "#3498db";
            if (travelData.bucket.includes(cleanCode)) return "#f1c40f";
            return "#bdc3c7";
        }

        function styleFeature(feature) {
            // Robustes Auslesen des ISO-Codes (fängt alle gängigen GeoJSON-Formate ab)
            const props = feature.properties;
            const isoCode = props.ISO_A3 || props.ADM0_A3 || props.iso_a3 || props.iso3 || props.id;
            
            return {
                fillColor: getCountryColor(isoCode),
                weight: 1,
                opacity: 1,
                color: '#ffffff',
                fillOpacity: 0.7
            };
        }

        function onEachFeature(feature, layer) {
            const props = feature.properties;
            const countryName = props.NAME_DE || props.name_de || props.NAME || props.name || "Unbekanntes Land";
            layer.bindPopup(countryName);
        }

        function toggleEditor() {
            document.getElementById('editorBox').classList.toggle('active');
        }

        // Status ändern via Dropdown
        function setCountryStatus(category) {
            const selectedCode = document.getElementById('countrySelect').value;

            // Zuerst alten Status überall entfernen
            travelData.family = travelData.family.filter(c => c !== selectedCode);
            travelData.noKids = travelData.noKids.filter(c => c !== selectedCode);
            travelData.bucket = travelData.bucket.filter(c => c !== selectedCode);

            // In neue Kategorie einsortieren (außer bei 'open')
            if (category !== 'open') {
                travelData[category].push(selectedCode);
            }

            // Auf dem iPhone speichern
            localStorage.setItem('travelData', JSON.stringify(travelData));

            // Karte live neu färben
            if (geoJsonLayer) {
                geoJsonLayer.setStyle(styleFeature);
            }

            toggleEditor();
        }

        // Absolut stabile und CORS-geprüfte GeoJSON Quelle laden
        const geoJsonUrl = 'https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json';

        fetch(geoJsonUrl)
            .then(res => {
                if (!res.ok) throw new Error();
                return res.json();
            })
            .then(geoData => {
                geoJsonLayer = L.geoJSON(geoData, {
                    style: styleFeature,
                    onEachFeature: onEachFeature
                }).addTo(map);
            })
            .catch(err => console.error("Kartenfehler:", err));
    </script>
</body>
</html>
